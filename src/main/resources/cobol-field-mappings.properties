# COBOL-to-Java field name mappings
# Format: COBOL-FIELD-NAME = javaFieldName
#
# Source copybooks:
#   legacy-accounts-cobol/copybooks/ACCOUNT.CPY
#   legacy-accounts-cobol/copybooks/TRANSACTION.CPY
#   legacy-loans-cobol/copybooks/LOAN.CPY

# Account fields
ACCOUNT-NUMBER           = accountNumber
ACCOUNT-BALANCE          = accountBalance
ACCOUNT-HOLDER-NAME      = accountHolderName
ACCOUNT-OPEN-DATE        = accountOpenDate
LAST-TRANSACTION-DT      = lastTransactionDate

# Transaction fields
TRANSACTION-ID           = transactionId
TRANSACTION-ACCT-NO      = accountNumber
TRANSACTION-TYPE         = transactionType
TRANSACTION-AMOUNT       = amount
TRANSACTION-DATE         = transactionDate
TRANSACTION-TIME         = transactionTime
TRANSACTION-STATUS       = transactionStatus

# Loan fields
LOAN-ID                  = loanId
LOAN-ACCOUNT-NUMBER      = accountNumber
LOAN-TYPE                = loanType
PRINCIPAL-AMOUNT         = principalAmount
INTEREST-RATE            = interestRate
MONTHLY-PAYMENT          = monthlyPayment
ORIGINATION-DATE         = originationDate
MATURITY-DATE            = maturityDate

# THESE TWO ARE DELIBERATELY SWAPPED - batch changes demo target
LOAN-TERM-MONTHS         = outstandingBalance
OUTSTANDING-BALANCE      = termMonths
